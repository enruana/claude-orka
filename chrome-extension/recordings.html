<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Orka Recordings</title>
  <link rel="stylesheet" href="recordings.css">
</head>
<body>
  <div class="page">
    <header class="page-header">
      <div class="header-left">
        <h1>Recordings</h1>
        <button id="btn-import" class="btn btn-secondary">+ Import Audio</button>
        <input type="file" id="file-input" accept="audio/*,.webm,.mp3,.wav,.ogg,.flac,.m4a,.mp4" multiple style="display:none">
      </div>
      <div class="header-right">
        <div class="server-status">
          <span class="status-dot" id="status-dot"></span>
          <span id="status-text">Checking...</span>
          <button id="btn-refresh-status" class="btn-icon" title="Refresh">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
          </button>
        </div>
        <a id="link-writer" class="btn btn-ghost" title="Writer">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
        </a>
      </div>
    </header>

    <div class="content">
      <div class="list-panel">
        <div id="recordings-list" class="recordings-list">
          <div class="empty-state" id="empty-state">
            <p>No recordings yet</p>
            <p class="hint">Record a tab or import audio to get started</p>
          </div>
        </div>
      </div>

      <div class="detail-panel" id="detail-panel">
        <div class="no-selection" id="no-selection">
          <p>Select a recording to view details</p>
        </div>
        <div id="detail-content" class="hidden">
          <!-- Header -->
          <div class="detail-header">
            <div class="detail-name-row">
              <h2 id="detail-name"></h2>
              <button id="btn-auto-name" class="btn-icon" title="Auto-name with AI">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
              </button>
            </div>
            <div class="detail-meta" id="detail-meta"></div>
          </div>

          <!-- Actions -->
          <div class="detail-actions">
            <button id="btn-transcribe" class="btn btn-primary">Transcribe</button>
            <button id="btn-download-audio" class="btn btn-secondary">Download Audio</button>
            <button id="btn-generate-report" class="btn btn-accent hidden">Generate Report</button>
          </div>

          <!-- Processing status -->
          <div id="processing-status" class="processing-status hidden">
            <div class="spinner"></div>
            <span id="processing-label">Processing...</span>
          </div>

          <!-- Tabs -->
          <div id="tabs-area" class="tabs-area hidden">
            <div class="tabs-bar">
              <button class="tab active" data-tab="transcript">Transcript</button>
              <button class="tab" data-tab="report">Report</button>
              <div class="tabs-spacer"></div>
              <button id="btn-copy" class="btn-icon" title="Copy">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
              </button>
              <button id="btn-download-text" class="btn-icon" title="Download">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
              </button>
            </div>

            <!-- Transcript tab -->
            <div id="tab-transcript" class="tab-content active">
              <div id="transcript-text" class="content-text"></div>
            </div>

            <!-- Report tab -->
            <div id="tab-report" class="tab-content">
              <div id="report-empty" class="tab-empty">
                <p>No report yet</p>
                <button id="btn-report-from-tab" class="btn btn-accent">Generate Report</button>
              </div>
              <div id="report-generating" class="tab-loading hidden">
                <div class="spinner"></div>
                <span>Generating report...</span>
              </div>
              <div id="report-text" class="content-text markdown hidden"></div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="marked.min.js"></script>
  <script src="storage.js"></script>
  <script src="recordings.js"></script>
</body>
</html>
